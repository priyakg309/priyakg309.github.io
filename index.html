<!DOCTYPE html>
<html lang="en">
<head>

    <title>My GitHub Project</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Simple styling to make the page look clean */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

            max-width: 800px;

        h1 {
            color: #2c3e50;
        }

    <div class="container">

        <h2>Project Goals</h2>
        <ul>
            <li>Build a clean user interface.</li>

            <li>Deploy via GitHub Pages.</li>

        </div>
